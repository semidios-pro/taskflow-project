<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<header>
<h1>TaskFlow</h1>
<p>Gestor simple de tareas</p>
</header>

<main>

<section class="form-section">

<form id="task-form">

<label for="task-input">Nueva tarea</label>

<input
id="task-input"
type="text"
placeholder="Escribe una tarea..."
required
>

<button type="submit">Añadir</button>

</form>

</section>


<section class="stats">

<div>Total: <span id="total">0</span></div>

<div>Completadas: <span id="completed">0</span></div>

<div>Pendientes: <span id="pending">0</span></div>

</section>


<section class="tasks">

<ul id="task-list"></ul>

</section>

</main>

<script src="app.js"></script>

</body>
</html>
